name: Build music playlist

on:
  push:
    paths:
      - 'music/*.mp3'
      - 'scripts/build-music-playlist.py'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Generate playlist
        run: python3 scripts/build-music-playlist.py
      - name: Commit playlist file
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add music-playlist.json
          if git diff --cached --quiet; then
            echo "No playlist changes to commit"
          else
            git commit -m "Update generated music playlist"
            git push
          fi
