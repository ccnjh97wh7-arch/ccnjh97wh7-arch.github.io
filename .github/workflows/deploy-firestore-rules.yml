name: Deploy Firestore Rules

on:
  push:
    branches:
      - main
    paths:
      - firestore.rules
      - firebase.json
      - .github/workflows/deploy-firestore-rules.yml
  workflow_dispatch:

jobs:
  deploy-rules:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Write Firebase service account key
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          if [ -z "$FIREBASE_SERVICE_ACCOUNT" ]; then
            echo "Missing secret FIREBASE_SERVICE_ACCOUNT"
            exit 1
          fi
          echo "$FIREBASE_SERVICE_ACCOUNT" > "$RUNNER_TEMP/firebase-sa.json"

      - name: Deploy Firestore rules
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/firebase-sa.json
        run: npx -y firebase-tools deploy --only firestore:rules --project rocky-taylor-memorial
