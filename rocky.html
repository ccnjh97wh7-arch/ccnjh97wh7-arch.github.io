<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
  import {
    addDoc,
    collection,
    getDocs,
    getFirestore,
    orderBy,
    query,
    serverTimestamp
  } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCw64gMvjhoKGwOlkTEF8Krvk3VX1KVup4",
    authDomain: "rocky-taylor-memorial.firebaseapp.com",
    projectId: "rocky-taylor-memorial",
    storageBucket: "rocky-taylor-memorial.firebasestorage.app",
    messagingSenderId: "1082208747146",
    appId: "1:1082208747146:web:5eee9fb14e2ef853d03773"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const form = document.querySelector("#memory-form");
  const submitButton = document.querySelector("#submit-button");
  const status = document.querySelector("#form-status");
  const memories = document.querySelector("#memories");

  async function loadApprovedMemories() {
    try {
      const memoriesQuery = query(
        collection(db, "memories"),
        orderBy("submittedAt", "desc")
      );

      const snapshot = await getDocs(memoriesQuery);

      if (snapshot.empty) {
        memories.innerHTML = `
          <article class="memory">
            <div class="memory-name">No memories have been posted yet.</div>
            <p>Check back soon.</p>
          </article>
        `;
        return;
      }

      memories.innerHTML = "";

      snapshot.forEach((doc) => {
        const memory = doc.data();
        const article = document.createElement("article");
        article.className = "memory";

        const name = document.createElement("div");
        name.className = "memory-name";
        name.textContent =
          memory.nickname ||
          memory.name ||
          "A friend of Rocky";

        const story = document.createElement("p");
        story.textContent = memory.story;

        article.append(name, story);
        memories.append(article);
      });
    } catch (error) {
      console.error("Could not load memories:", error);
      memories.innerHTML = `
        <article class="memory">
          <div class="memory-name">Unable to load memories right now.</div>
          <p>Please try again later.</p>
        </article>
      `;
    }
  }

  form.addEventListener("submit", async (event) => {
    event.preventDefault();

    const name = document.querySelector("#name").value.trim();
    const nickname = document.querySelector("#nickname").value.trim();
    const story = document.querySelector("#story").value.trim();

    if (!story) {
      status.textContent = "Please write a memory before sending it.";
      return;
    }

    submitButton.disabled = true;
    status.textContent = "Sending your memory...";

    try {
      await addDoc(collection(db, "memories"), {
        name,
        nickname,
        story,
        submittedAt: serverTimestamp()
      });

      form.reset();
      status.textContent = "Thank you. Your memory has been posted.";
      await loadApprovedMemories();
    } catch (error) {
      console.error("Could not submit memory:", error);
      status.textContent =
        "Something went wrong. Please try again in a moment.";
    } finally {
      submitButton.disabled = false;
    }
  });

  loadApprovedMemories();
</script>
